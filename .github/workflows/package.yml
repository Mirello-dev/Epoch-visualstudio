name: Package Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore
        run: msbuild EpochVisualStudio.csproj /t:Restore /p:Configuration=Release

      - name: Build & Package
        run: msbuild EpochVisualStudio.csproj /t:Build /p:Configuration=Release

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: extension
          path: bin/Release/*.vsix
