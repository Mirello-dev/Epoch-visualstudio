name: Publish Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: msbuild EpochVisualStudio.csproj /t:Restore /p:Configuration=Release

      - name: Build & Package
        run: msbuild EpochVisualStudio.csproj /t:Build /p:Configuration=Release

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: bin/Release/*.vsix
          retention-days: 1

  publish-vs-marketplace:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: artifact

      - name: Publish to Visual Studio Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $publisher = Join-Path $vsPath "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          if (-not (Test-Path $publisher)) {
            throw "VsixPublisher.exe not found at $publisher"
          }
          $vsix = Get-ChildItem -Path artifact -Filter *.vsix -Recurse | Select-Object -First 1
          if (-not $vsix) {
            throw "No .vsix found in the downloaded artifact."
          }
          Write-Host "Publishing $($vsix.FullName)"
          & $publisher publish -payload "$($vsix.FullName)" -publishManifest "vs-publish.json" -personalAccessToken "$env:VS_MARKETPLACE_PAT"
